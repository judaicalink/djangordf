name: Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 djangordf setup.py tests

      - name: Run pytest
        run: pytest

  fuseki-integration:
    runs-on: ubuntu-latest
    services:
      fuseki:
        image: stain/jena-fuseki:5.1.0
        ports:
          - 3030:3030
        env:
          ADMIN_PASSWORD: admin
          FUSEKI_DATASET_1: ds

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Wait for Fuseki to become reachable
        run: |
          for attempt in $(seq 1 60); do
            if curl -fs http://localhost:3030/ >/dev/null 2>&1; then
              echo "Fuseki is up after ${attempt} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Fuseki did not become reachable within the budget"
          curl -v http://localhost:3030/ || true
          exit 1

      - name: Run Fuseki integration tests
        env:
          DJANGORDF_FUSEKI_ENDPOINT: http://localhost:3030/ds
        run: pytest -m fuseki -v
