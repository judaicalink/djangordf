name: Feature request
description: Suggest new functionality or an API change.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Feature requests that name a
        concrete use case and a sketched API tend to get traction the
        fastest. If you are not sure whether something is in scope,
        open the issue anyway — we will gladly discuss.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: |
        What problem are you trying to solve? Describe the user-facing
        scenario rather than the implementation. "I want X so that Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Sketch the API or behaviour you have in mind. Code examples
        showing how a caller would use it are welcome.
      render: python
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you weighed and why this proposal is
        preferable, or known workarounds you currently use.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Suggested scope / out of scope
      description: |
        Bullet what this proposal should cover and what it should
        deliberately not cover. Helps keep the resulting PR focused.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: References to related issues, prior art, or specs.
    validations:
      required: false
